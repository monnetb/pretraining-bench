# ============================================================================
# Model configuration presets for transformer-bench
# ============================================================================
# Two architecture families:
#   gpt2  — LayerNorm, GELU, full multi-head attention, learned pos embeddings
#   llama — RMSNorm, SwiGLU, grouped-query attention, rotary pos embeddings
# ============================================================================

vocab_size: 50257   # GPT-2 tokenizer vocabulary size (shared across all)

models:
  # --------------------------------------------------------------------------
  # Small ≈ 125 M parameters — fits on any GPU, fast iteration
  # --------------------------------------------------------------------------
  small-gpt2:
    arch_style: gpt2
    hidden_size: 768
    num_attention_heads: 12
    num_layers: 12
    ffn_hidden_size: 3072
    num_gqa_groups: null          # full MHA
    normalization: LayerNorm
    activation: gelu
    bias: true
    max_seq_length: 2048

  small-llama:
    arch_style: llama
    hidden_size: 768
    num_attention_heads: 12
    num_layers: 12
    ffn_hidden_size: 3072         # SwiGLU: effective is 2/3 * ffn_hidden_size
    num_gqa_groups: 4             # GQA: 12 heads / 4 groups = 3 heads per group
    normalization: RMSNorm
    activation: swiglu
    bias: false
    max_seq_length: 2048

  # --------------------------------------------------------------------------
  # Medium ≈ 350 M parameters
  # --------------------------------------------------------------------------
  medium-gpt2:
    arch_style: gpt2
    hidden_size: 1024
    num_attention_heads: 16
    num_layers: 24
    ffn_hidden_size: 4096
    num_gqa_groups: null
    normalization: LayerNorm
    activation: gelu
    bias: true
    max_seq_length: 2048

  medium-llama:
    arch_style: llama
    hidden_size: 1024
    num_attention_heads: 16
    num_layers: 24
    ffn_hidden_size: 4096
    num_gqa_groups: 4
    normalization: RMSNorm
    activation: swiglu
    bias: false
    max_seq_length: 2048

  # --------------------------------------------------------------------------
  # Large ≈ 760 M parameters
  # --------------------------------------------------------------------------
  large-gpt2:
    arch_style: gpt2
    hidden_size: 1536
    num_attention_heads: 16
    num_layers: 24
    ffn_hidden_size: 6144
    num_gqa_groups: null
    normalization: LayerNorm
    activation: gelu
    bias: true
    max_seq_length: 2048

  large-llama:
    arch_style: llama
    hidden_size: 1536
    num_attention_heads: 16
    num_layers: 24
    ffn_hidden_size: 6144
    num_gqa_groups: 4
    normalization: RMSNorm
    activation: swiglu
    bias: false
    max_seq_length: 2048

  # --------------------------------------------------------------------------
  # XLarge ≈ 1.3 B parameters — stress test for memory & compute
  # --------------------------------------------------------------------------
  xlarge-gpt2:
    arch_style: gpt2
    hidden_size: 2048
    num_attention_heads: 32
    num_layers: 24
    ffn_hidden_size: 8192
    num_gqa_groups: null
    normalization: LayerNorm
    activation: gelu
    bias: true
    max_seq_length: 2048

  xlarge-llama:
    arch_style: llama
    hidden_size: 2048
    num_attention_heads: 32
    num_layers: 24
    ffn_hidden_size: 8192
    num_gqa_groups: 8
    normalization: RMSNorm
    activation: swiglu
    bias: false
    max_seq_length: 2048
